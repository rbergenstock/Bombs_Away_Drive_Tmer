<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💣 BombsAway Drive Timer</title>
<style>
:fullscreen, :-webkit-full-screen { background:#0A0A14; }
</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0A0A14}
body{color:#E0E0E0;font-family:'Rajdhani',sans-serif}

/* ===== SETUP SCREEN ===== */
#setupScreen{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:32px;
    background:#0A0A14;z-index:100;
}
.setup-title{
    font-family:'Orbitron',monospace;font-size:28px;font-weight:900;
    color:#C9A84C;letter-spacing:4px;text-align:center;
}
.setup-subtitle{font-size:16px;color:#555;letter-spacing:2px;margin-top:4px}
.setup-section{text-align:center}
.setup-label{
    font-size:13px;font-weight:700;letter-spacing:3px;color:#555;
    text-transform:uppercase;margin-bottom:12px;
}
.setup-row{display:flex;gap:16px;justify-content:center}
.setup-btn{
    width:140px;height:70px;border-radius:8px;border:2px solid #333;
    background:transparent;font-family:'Rajdhani',sans-serif;
    font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;
    transition:all .15s;color:#555;
}
.setup-btn.red{border-color:#F44336;color:#F44336}
.setup-btn.blue{border-color:#2196F3;color:#2196F3}
.setup-btn.win-red{border-color:#F44336;color:#F44336}
.setup-btn.win-blue{border-color:#2196F3;color:#2196F3}
.setup-btn.win-tie{border-color:#888;color:#888}
.setup-btn.active.red{background:#F44336;color:#fff;box-shadow:0 0 20px #F4433644}
.setup-btn.active.blue{background:#2196F3;color:#fff;box-shadow:0 0 20px #2196F344}
.setup-btn.active.win-red{background:#F44336;color:#fff;box-shadow:0 0 20px #F4433644}
.setup-btn.active.win-blue{background:#2196F3;color:#fff;box-shadow:0 0 20px #2196F344}
.setup-btn.active.win-tie{background:#888;color:#fff}

#startBtn{
    width:240px;height:72px;border-radius:8px;border:none;
    background:#1A3A1A;color:#2E4;font-family:'Orbitron',monospace;
    font-size:20px;font-weight:700;letter-spacing:3px;cursor:pointer;
    transition:all .2s;opacity:.4;pointer-events:none;
}
#startBtn.ready{
    background:#1C5C1C;color:#4CAF50;opacity:1;pointer-events:all;
    box-shadow:0 0 30px #4CAF5033;
}
#startBtn.ready:hover{background:#4CAF50;color:#000}

/* ===== MAIN TIMER SCREEN ===== */
#timerScreen{display:none;flex-direction:column;height:100vh}

/* Top bar */
.top-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 20px;background:#111122;border-bottom:2px solid #1A1A33;
    flex-shrink:0;
}
.brand{color:#C9A84C;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px}
.alliance-badge{
    font-size:15px;font-weight:700;letter-spacing:2px;
    padding:4px 14px;border-radius:4px;
}
.alliance-badge.red{background:#F4433622;color:#F44336;border:1px solid #F4433644}
.alliance-badge.blue{background:#2196F322;color:#2196F3;border:1px solid #2196F344}
#resetBtn{
    padding:5px 16px;background:transparent;border:1px solid #333;border-radius:4px;
    color:#555;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:1px;cursor:pointer;transition:all .15s;
}
#resetBtn:hover{border-color:#C9A84C;color:#C9A84C}

/* Clock area */
.clock-area{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;position:relative;overflow:hidden;
    transition:background .5s;
}
.clock-glow{
    position:absolute;top:50%;left:50%;width:500px;height:500px;
    border-radius:50%;transform:translate(-50%,-50%);
    opacity:0;transition:all .5s;pointer-events:none;
}
.phase-auto .clock-glow{background:radial-gradient(circle,#4CAF5022 0%,transparent 70%);opacity:1}
.phase-disabled .clock-glow{background:radial-gradient(circle,#FF980022 0%,transparent 70%);opacity:1}
.phase-shift .clock-glow{background:radial-gradient(circle,#2196F322 0%,transparent 70%);opacity:1}
.phase-shift.my-active .clock-glow{background:radial-gradient(circle,#4CAF5033 0%,transparent 70%);opacity:1}
.phase-endgame .clock-glow{background:radial-gradient(circle,#FF572222 0%,transparent 70%);opacity:1}

#phaseLabel{
    font-family:'Orbitron',monospace;font-size:18px;font-weight:700;
    letter-spacing:4px;margin-bottom:8px;transition:color .3s;
}
#bigClock{
    font-family:'Orbitron',monospace;font-size:96px;font-weight:900;
    line-height:1;transition:color .3s;
    text-shadow:0 0 40px currentColor;
}
#hubStatus{
    font-size:22px;font-weight:700;letter-spacing:1px;
    margin-top:16px;min-height:32px;transition:color .3s;
}
#shiftInfo{
    font-size:14px;color:#555;letter-spacing:1px;margin-top:8px;min-height:20px;
}
#phaseCountdown{
    font-family:'Orbitron',monospace;font-size:28px;font-weight:700;
    margin-top:12px;min-height:40px;transition:color .3s;
}


#mainBtn{
    width:200px;height:56px;border-radius:8px;border:2px solid #4CAF50;
    background:#1C5C1C;color:#4CAF50;font-family:'Orbitron',monospace;
    font-size:18px;font-weight:700;letter-spacing:2px;cursor:pointer;
    transition:all .15s;margin:16px 0 8px 0;
}
#mainBtn:hover{background:#4CAF50;color:#000}
#mainBtn.running{border-color:#F44336;background:#3A1A1A;color:#F44336}
#mainBtn.running:hover{background:#F44336;color:#fff}
#mainBtn.done{border-color:#555;background:#1A1A2E;color:#555;pointer-events:none}

/* Timeline */
.timeline{
    display:flex;padding:0 20px 12px;gap:3px;flex-shrink:0;
}
.tl-seg{
    height:6px;border-radius:3px;background:#1A1A2E;
    transition:all .3s;flex:1;
}
.tl-seg.auto{background:#1A2E1A}
.tl-seg.disabled-seg{background:#2E1A00}
.tl-seg.shift1,.tl-seg.shift2,.tl-seg.shift3,.tl-seg.shift4{background:#1A1A3A}
.tl-seg.endgame{background:#2E1A0A}
.tl-seg.past{opacity:.3}
.tl-seg.current{
    background:#C9A84C !important;
    box-shadow:0 0 8px #C9A84C88;
}

/* Flash overlay */
#flash{
    position:fixed;inset:0;pointer-events:none;opacity:0;
    transition:opacity .1s;
}
#flash.active{animation:flashAnim .4s ease-out forwards}
@keyframes flashAnim{
    0%{opacity:.35}
    100%{opacity:0}
}
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setupScreen">
    <div style="position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 20px;background:#111122;border-bottom:2px solid #1A1A33;">
        <button onclick="toggleFullscreen()" id="fsBtnSetup" style="padding:5px 14px;background:transparent;border:1px solid #C9A84C55;border-radius:4px;color:#C9A84C;font-family:Rajdhani,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;">⛶ FULLSCREEN</button>
        <div style="font-family:Orbitron,monospace;font-size:12px;font-weight:700;color:#C9A84C;letter-spacing:2px;">💣 BOMBSAWAY DRIVE TIMER</div>
        <div style="width:120px;"></div>
    </div>
    <div>
        <div class="setup-title">💣 BOMBSAWAY</div>
        <div class="setup-subtitle">DRIVE TEAM TIMER — REBUILT 2026</div>
    </div>

    <div class="setup-section">
        <div class="setup-label">Your Alliance</div>
        <div class="setup-row">
            <button class="setup-btn red" onclick="pickAlliance('red',this)">🔴 RED</button>
            <button class="setup-btn blue" onclick="pickAlliance('blue',this)">🔵 BLUE</button>
        </div>
    </div>

    <div class="setup-section">
        <div class="setup-label">Who Wins Auto?</div>
        <div class="setup-row">
            <button class="setup-btn win-red" onclick="pickAutoWinner('red',this)">RED WINS</button>
            <button class="setup-btn win-tie" onclick="pickAutoWinner('tie',this)">TIE</button>
            <button class="setup-btn win-blue" onclick="pickAutoWinner('blue',this)">BLUE WINS</button>
        </div>
    </div>

    <button id="startBtn" onclick="startMatch()">▶ START MATCH</button>

    
</div>

<!-- ===== TIMER SCREEN ===== -->
<div id="timerScreen">
    <div class="top-bar">
        <button id="fsBtn" onclick="toggleFullscreen()" style="padding:5px 14px;background:transparent;border:1px solid #C9A84C55;border-radius:4px;color:#C9A84C;font-family:Rajdhani,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-right:12px;">⛶ FULLSCREEN</button>
        <div class="brand">💣 BOMBSAWAY DRIVE TIMER</div>
        <div id="allianceBadge" class="alliance-badge">—</div>
        <div style="display:flex;gap:8px">
        <button id="resetBtn" onclick="resetMatch()" style="padding:5px 16px;background:transparent;border:1px solid #333;border-radius:4px;color:#555;font-family:Rajdhani,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;">↩ RESET</button>
        <button onclick="exitApp()" style="padding:5px 14px;background:transparent;border:1px solid #F4433655;border-radius:4px;color:#F44336;font-family:Rajdhani,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;">✕ EXIT</button>
        </div>
    </div>

    <div id="clockArea" class="clock-area">
        <div class="clock-glow"></div>
        <div id="phaseLabel">—</div>
        <div id="bigClock">2:43</div>
        <button id="mainBtn" onclick="toggleTimer()">▶ START</button>
        <div id="hubStatus">Select alliance to begin</div>
        <div id="shiftInfo"></div>
        <div id="phaseCountdown"></div>
    </div>

    <div class="timeline" id="timeline"></div>
</div>

<div id="flash"></div>

<script>
// ===== MATCH TIMELINE =====
// REBUILT 2026: AUTO(15s) + DISABLED(3s) + TELEOP(135s) = 153s total
// Teleop: 4 hub shifts of ~28s each + END GAME last 30s

const MATCH_MS = 153000;

const TL_SEGS = [
    {name:'AUTO',      ms:15000, cls:'auto'},
    {name:'DISABLED',  ms:3000,  cls:'disabled-seg'},
    {name:'SHIFT 1',   ms:26000, cls:'shift1'},
    {name:'SHIFT 2',   ms:26000, cls:'shift2'},
    {name:'SHIFT 3',   ms:26000, cls:'shift3'},
    {name:'SHIFT 4',   ms:27000, cls:'shift4'},
    {name:'END GAME',  ms:30000, cls:'endgame'},
];

// Hub active schedule per shift — depends on who won auto
// autoWinner: 'red' or 'blue' or 'tie'
// Shifts cycle: if red won auto, red hub active first, then alternates
// redActive: true = red hub active, false = blue hub active this shift
function getShiftSchedule(autoWinner) {
    if (autoWinner === 'red') {
        return [
            {redActive:true,  blueActive:false},  // Shift 1
            {redActive:false, blueActive:true},   // Shift 2
            {redActive:true,  blueActive:false},  // Shift 3
            {redActive:false, blueActive:true},   // Shift 4
        ];
    } else if (autoWinner === 'blue') {
        return [
            {redActive:false, blueActive:true},   // Shift 1
            {redActive:true,  blueActive:false},  // Shift 2
            {redActive:false, blueActive:true},   // Shift 3
            {redActive:true,  blueActive:false},  // Shift 4
        ];
    } else { // tie — both active every shift
        return [
            {redActive:true, blueActive:true},
            {redActive:true, blueActive:true},
            {redActive:true, blueActive:true},
            {redActive:true, blueActive:true},
        ];
    }
}

// ===== STATE =====
let myAlliance = '';
let autoWinner = '';
let running = false;
let startTime = null;
let elapsed = 0;
let rafId = null;
let shiftSchedule = [];

// ===== SETUP =====
function pickAlliance(alliance, btn) {
    myAlliance = alliance;
    document.querySelectorAll('.setup-btn.red, .setup-btn.blue').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    checkReady();
}

function pickAutoWinner(winner, btn) {
    autoWinner = winner;
    document.querySelectorAll('.setup-btn.win-red, .setup-btn.win-blue, .setup-btn.win-tie').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    checkReady();
}

function checkReady() {
    const btn = document.getElementById('startBtn');
    if (myAlliance && autoWinner) {
        btn.classList.add('ready');
    } else {
        btn.classList.remove('ready');
    }
}

function startMatch() {
    if (!myAlliance || !autoWinner) return;
    shiftSchedule = getShiftSchedule(autoWinner);

    // Update alliance badge
    const badge = document.getElementById('allianceBadge');
    badge.textContent = (myAlliance === 'red' ? '🔴 RED ALLIANCE' : '🔵 BLUE ALLIANCE') +
        '  |  Auto: ' + (autoWinner === 'red' ? 'RED' : autoWinner === 'blue' ? 'BLUE' : 'TIE');
    badge.className = 'alliance-badge ' + myAlliance;

    // Switch screens
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('timerScreen').style.display = 'flex';

    buildTimeline();
    updateDisplay(0);
    go();
}

// ===== TIMELINE =====
function buildTimeline() {
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';
    const totalMs = TL_SEGS.reduce((s,seg) => s + seg.ms, 0);
    TL_SEGS.forEach((seg, i) => {
        const div = document.createElement('div');
        div.className = 'tl-seg ' + seg.cls;
        div.style.flex = seg.ms / totalMs;
        div.title = seg.name;
        tl.appendChild(div);
    });
}

// ===== TIMER CONTROL =====
function toggleTimer() {
    if (running) stopTimer();
    else go();
}

function go() {
    if (elapsed >= MATCH_MS) return;
    running = true;
    startTime = performance.now() - elapsed;
    document.getElementById('mainBtn').textContent = '⏸ PAUSE';
    document.getElementById('mainBtn').className = 'running';
    tick();
}

function stopTimer() {
    running = false;
    cancelAnimationFrame(rafId);
    document.getElementById('mainBtn').textContent = '▶ RESUME';
    document.getElementById('mainBtn').className = '';
}

function resetMatch() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0;
    myAlliance = '';
    autoWinner = '';
    shiftSchedule = [];

    document.getElementById('timerScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';

    // Reset setup buttons
    document.querySelectorAll('.setup-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('startBtn').classList.remove('ready');
}

function tick() {
    if (!running) return;
    elapsed = performance.now() - startTime;
    if (elapsed >= MATCH_MS) {
        elapsed = MATCH_MS;
        running = false;
        updateDisplay(elapsed);
        document.getElementById('mainBtn').textContent = 'MATCH OVER';
        document.getElementById('mainBtn').className = 'done';
        return;
    }
    updateDisplay(elapsed);
    rafId = requestAnimationFrame(tick);
}

// ===== DISPLAY =====
function getPhaseAt(ms) {
    let cum = 0;
    for (let i = 0; i < TL_SEGS.length; i++) {
        cum += TL_SEGS[i].ms;
        if (ms < cum) {
            return {
                seg: TL_SEGS[i],
                idx: i,
                remaining: cum - ms,
                segElapsed: ms - (cum - TL_SEGS[i].ms)
            };
        }
    }
    return {seg: TL_SEGS[TL_SEGS.length-1], idx: TL_SEGS.length-1, remaining: 0, segElapsed: TL_SEGS[TL_SEGS.length-1].ms};
}

function updateDisplay(ms) {
    const remaining = Math.max(0, MATCH_MS - ms);
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    document.getElementById('bigClock').textContent = mins + ':' + String(secs).padStart(2,'0');

    const phase = getPhaseAt(ms);
    const pName = phase.seg.name;
    const pRemSec = Math.ceil(phase.remaining / 1000);

    let phaseColor = '#C9A84C';
    let hubText = '';
    let shiftText = '';
    let clockAreaClass = 'clock-area';

    if (pName === 'AUTO') {
        phaseColor = '#4CAF50';
        clockAreaClass += ' phase-auto';
        hubText = '⚡ AUTO PERIOD';
        shiftText = 'Ends in ' + pRemSec + 's';
    } else if (pName === 'DISABLED') {
        phaseColor = '#FF9800';
        clockAreaClass += ' phase-disabled';
        hubText = '⏸ DISABLED';
        shiftText = 'Teleop starting in ' + pRemSec + 's';
    } else if (pName.startsWith('SHIFT')) {
        const shiftNum = parseInt(pName.split(' ')[1]) - 1; // 0-indexed
        const hub = shiftSchedule[shiftNum] || {redActive:true, blueActive:false};
        const myActive = myAlliance === 'red' ? hub.redActive : hub.blueActive;
        const opponentActive = myAlliance === 'red' ? hub.blueActive : hub.redActive;

        if (hub.redActive && hub.blueActive) {
            phaseColor = '#C9A84C';
            hubText = '⚡ BOTH HUBS ACTIVE';
            clockAreaClass += ' phase-shift';
        } else if (myActive) {
            phaseColor = '#4CAF50';
            hubText = '✅ YOUR HUB ACTIVE — SCORE NOW!';
            clockAreaClass += ' phase-shift my-active';
        } else {
            phaseColor = '#F44336';
            hubText = '❌ YOUR HUB INACTIVE — DEFEND!';
            clockAreaClass += ' phase-shift';
        }

        // Next shift info
        const nextShiftIdx = shiftNum + 1;
        if (nextShiftIdx < shiftSchedule.length) {
            const nextHub = shiftSchedule[nextShiftIdx];
            const nextMyActive = myAlliance === 'red' ? nextHub.redActive : nextHub.blueActive;
            shiftText = pName + ' — ' + pRemSec + 's left  →  Next: ' + (nextMyActive ? 'YOUR HUB ACTIVE' : 'opponent hub active');
        } else {
            shiftText = pName + ' — ' + pRemSec + 's left  →  END GAME next';
        }
    } else if (pName === 'END GAME') {
        phaseColor = '#FF5722';
        clockAreaClass += ' phase-endgame';
        hubText = '🏆 END GAME — BOTH HUBS ACTIVE!';
        shiftText = 'CLIMB NOW! ' + pRemSec + 's remaining';
    }

    document.getElementById('clockArea').className = clockAreaClass;
    document.getElementById('phaseLabel').textContent = pName;
    document.getElementById('phaseLabel').style.color = phaseColor;
    document.getElementById('bigClock').style.color = phaseColor;
    document.getElementById('bigClock').style.textShadow = '0 0 40px ' + phaseColor + '66';
    document.getElementById('hubStatus').textContent = hubText;
    document.getElementById('hubStatus').style.color = phaseColor;
    document.getElementById('shiftInfo').textContent = shiftText;
    document.getElementById('phaseCountdown').textContent = running && pName !== 'MATCH OVER' ? pRemSec + 's' : '';
    document.getElementById('phaseCountdown').style.color = phaseColor;

    // Flash on phase transitions (last 3 seconds of each phase)
    if (running && phase.remaining < 3100 && phase.remaining > 2900) {
        const flash = document.getElementById('flash');
        flash.style.background = phaseColor;
        flash.classList.remove('active');
        void flash.offsetWidth;
        flash.classList.add('active');
    }

    // Timeline highlight
    document.querySelectorAll('.tl-seg').forEach((seg, i) => {
        seg.classList.toggle('past', i < phase.idx);
        seg.classList.toggle('current', i === phase.idx && running);
    });
}

// Fullscreen
function goFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el);
}

function toggleFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
    if (!isFs) {
        if (req) req.call(el);
    } else {
        if (exit) exit.call(document);
    }
}

document.addEventListener('fullscreenchange', updateFsBtn);
document.addEventListener('webkitfullscreenchange', updateFsBtn);
document.addEventListener('mozfullscreenchange', updateFsBtn);

function updateFsBtn() {
    const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
    const label = isFs ? '✕ EXIT FULL' : '⛶ FULLSCREEN';
    const btn = document.getElementById('fsBtn');
    const btnSetup = document.getElementById('fsBtnSetup');
    if (btn) btn.textContent = label;
    if (btnSetup) btnSetup.textContent = label;
}

function exitApp() {
    if (document.fullscreenElement) document.exitFullscreen();
    window.close();
    // Fallback if window.close() blocked
    document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;background:#0A0A14;font-family:Rajdhani,sans-serif;color:#555;font-size:18px;letter-spacing:2px;">Close this tab to exit.</div>';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (document.getElementById('setupScreen').style.display !== 'none') {
            startMatch();
        } else {
            toggleTimer();
        }
    }
    if (e.code === 'KeyR') resetMatch();
});

updateDisplay(0);
</script>
</body>
</html>
